<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CHRONO CONDUITE ACCOMPAGNÉE</title>

<meta name="theme-color" content="#2d3cff">
<link rel="apple-touch-icon" href="icon_chrono.png">
<link rel="icon" type="image/png" href="icon_chrono.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  background:
    radial-gradient(circle at 15% 18%, rgba(0,168,255,.45), transparent 26%),
    radial-gradient(circle at 85% 18%, rgba(255,126,32,.45), transparent 28%),
    radial-gradient(circle at 78% 82%, rgba(255,42,109,.26), transparent 24%),
    linear-gradient(135deg,#1d2cff 0%, #1a1460 42%, #31135d 70%, #ff6a00 100%);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 16px;
}

.container{
  width:100%;
  max-width:560px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.titleBox{
  border-radius:32px;
  padding:24px 22px;
  text-align:center;
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:0 20px 60px rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.16);
}

h1{
  font-size:clamp(28px,6vw,40px);
  line-height:1.03;
  letter-spacing:-.03em;
  font-weight:900;
  text-transform:uppercase;
  text-shadow:0 4px 18px rgba(0,0,0,.25);
}

.block{
  border-radius:30px;
  padding:28px 22px;
  text-align:center;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 20px 60px rgba(0,0,0,0.28);
}

.top{background:rgba(78,152,255,.20)}
.middle{background:rgba(255,115,40,.18)}
.bottom{background:rgba(108,71,255,.18)}

label{
  display:block;
  font-size:14px;
  margin-bottom:12px;
  opacity:.95;
  font-weight:700;
  letter-spacing:.01em;
}

input{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.22);
  border-radius:20px;
  padding:20px 18px;
  font-size:34px;
  text-align:center;
  color:#fff;
  outline:none;
  font-weight:800;
}

input::placeholder{color:rgba(255,255,255,.75)}

button{
  margin-top:14px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  font-size:18px;
  font-weight:900;
  background:linear-gradient(135deg,#ffffff,#dff2ff);
  color:#172554;
  box-shadow:0 10px 25px rgba(255,255,255,.18);
}

.result{
  font-size:34px;
  font-weight:900;
  line-height:1.22;
  letter-spacing:-.03em;
}

.result small{
  display:block;
  margin-top:10px;
  font-size:17px;
  font-weight:700;
  opacity:.95;
}

@media (max-width:430px){
  .block{padding:24px 18px}
  input{font-size:30px}
  .result{font-size:30px}
}
</style>
</head>

<body>
<div class="container">

  <div class="titleBox">
    <h1>CHRONO CONDUITE<br>ACCOMPAGNÉE</h1>
  </div>

  <div class="block top">
    <label>Kilomètres départ</label>
    <input id="startKm" type="number" inputmode="decimal" placeholder="0">
    <button onclick="start()">Démarrer</button>
  </div>

  <div class="block middle">
    <label>Kilomètres arrivée</label>
    <input id="endKm" type="number" inputmode="decimal" placeholder="0">
    <button onclick="stop()">Stop</button>
  </div>

  <div class="block bottom">
    <div class="result" id="result">
      0 km<br>0 min
      <small>Kilomètres parcourus et temps mis</small>
    </div>
  </div>

</div>

<script>
let startTime = null;
let startKm = null;

function num(v){
  return parseFloat(String(v).replace(",", "."));
}

function start(){
  startKm = num(document.getElementById("startKm").value);
  if(isNaN(startKm)) return alert("Entrer km départ");
  startTime = Date.now();
  localStorage.setItem("startTripChrono", JSON.stringify({startKm, startTime}));
}

function stop(){
  const endKm = num(document.getElementById("endKm").value);
  if(isNaN(endKm)) return alert("Entrer km arrivée");
  if(startTime === null){
    const saved = JSON.parse(localStorage.getItem("startTripChrono") || "null");
    if(saved){
      startTime = saved.startTime;
      startKm = saved.startKm;
    }
  }
  if(startTime === null) return alert("Démarrer d'abord");

  const distance = (endKm - startKm).toFixed(1);
  const minutes = Math.round((Date.now() - startTime) / 60000);

  document.getElementById("result").innerHTML =
    distance + " km<br>" + minutes + " min" +
    '<small>Kilomètres parcourus et temps mis</small>';

  localStorage.setItem("lastTrip", JSON.stringify({distance, minutes}));
  localStorage.removeItem("startTripChrono");
  startTime = null;
  startKm = null;
}

window.onload = () => {
  const last = JSON.parse(localStorage.getItem("lastTrip") || "null");
  const saved = JSON.parse(localStorage.getItem("startTripChrono") || "null");
  if(saved){
    startTime = saved.startTime;
    startKm = saved.startKm;
    document.getElementById("startKm").value = saved.startKm;
  }
  if(last){
    document.getElementById("result").innerHTML =
      last.distance + " km<br>" + last.minutes + " min" +
      '<small>Kilomètres parcourus et temps mis</small>';
  }
}
</script>
</body>
</html>
