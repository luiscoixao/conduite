<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Conduite accompagnée</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f3f3f6;
  color:#111;
  padding:0 18px 140px;
}

.app{max-width:760px;margin:0 auto}

/* HEADER FIXE */
.header{
  position:sticky;
  top:0;
  background:#f3f3f6;
  z-index:1000;
  padding:28px 0 12px;
}

h1{
  margin:0;
  font-size:42px;
  font-weight:800;
  letter-spacing:-0.04em;
  color:#ff7a00;
}

.subtitle{
  font-size:16px;
  color:#8e8e93;
  margin-top:6px;
}

.notice{
  background:#fff;
  border-radius:16px;
  padding:12px;
  margin:14px 0;
  color:#666;
}

.small-btn{
  background:#fff;
  color:#ff7a00;
  border:1px solid #ececf1;
  border-radius:14px;
  padding:12px;
  margin-right:10px;
  font-weight:700;
}

.drive{
  padding:16px 0;
  border-bottom:1px solid #ececf1;
}

.drive-title{
  font-size:20px;
  font-weight:800;
}

.drive-meta{
  font-size:15px;
  color:#ff7a00;
  margin-top:4px;
}

.drive-note{
  font-size:14px;
  color:#8e8e93;
  margin-top:6px;
}

.drive-actions{
  margin-top:10px;
}

.mini-btn{
  background:#fff;
  color:#ff7a00;
  border:1px solid #ececf1;
  border-radius:12px;
  padding:10px 12px;
  margin-right:8px;
  font-weight:700;
}

.totals{
  margin-top:20px;
}

.total-box{
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
}

.total-value{
  font-size:26px;
  font-weight:800;
  color:#ff7a00;
}

.fab{
  position:fixed;
  right:20px;
  bottom:30px;
  width:70px;
  height:70px;
  border-radius:35px;
  background:#ff7a00;
  color:#fff;
  font-size:40px;
  border:none;
}

/* EDITOR */
.editor{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:20px;
  border-radius:20px 20px 0 0;
}

.editor.open{display:block}

.field{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

.btn{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:700;
}

.btn-save{background:#ff7a00;color:#fff}
.btn-cancel{background:#eee}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>Conduite accompagnée</h1>
  <div class="subtitle">Suivi des trajets de Quentin</div>
</div>

<div id="notice" class="notice">Trajets importés</div>

<button onclick="resetData()" class="small-btn">Réinitialiser</button>

<div id="list"></div>

<div class="totals">
  <div class="total-box">
    <div>Total km</div>
    <div id="totalKm" class="total-value"></div>
  </div>
  <div class="total-box">
    <div>Total heures</div>
    <div id="totalHours" class="total-value"></div>
  </div>
</div>

</div>

<button class="fab" onclick="openEditor()">+</button>

<div id="editor" class="editor">
  <input id="date" type="date" class="field">
  <input id="trip" placeholder="Type de trajet" class="field">
  <input id="duration" placeholder="Durée (min)" class="field">
  <input id="km" placeholder="Km" class="field">
  <input id="car" placeholder="Voiture" class="field">
  <input id="weather" placeholder="Météo" class="field">
  <button onclick="save()" class="btn btn-save">Enregistrer</button>
  <button onclick="closeEditor()" class="btn btn-cancel">Annuler</button>
</div>

<script>
var data = [
{date:"2025-12-19",trip:"Ville",duration:15,km:2.8,car:"Titine",weather:"Nuit"},
{date:"2025-12-21",trip:"Agglomération",duration:18,km:7,car:"Titine",weather:"Pluie"}
];

function formatDate(d){
  if(!d)return "";
  var x=new Date(d);
  return x.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
}

function render(){
  var html="";
  var totalKm=0,totalMin=0;

  for(var i=0;i<data.length;i++){
    var d=data[i];
    totalKm+=Number(d.km);
    totalMin+=Number(d.duration);

    html+=
    '<div class="drive">'+
    '<div class="drive-title">'+formatDate(d.date)+'</div>'+
    '<div class="drive-meta">'+d.trip+' · '+d.duration+' min · '+d.km+' km</div>'+
    '<div class="drive-note">🚗 '+d.car+' · '+d.weather+'</div>'+
    '</div>';
  }

  document.getElementById("list").innerHTML=html;

  document.getElementById("totalKm").innerHTML=totalKm+" km";
  document.getElementById("totalHours").innerHTML=Math.floor(totalMin/60)+" h "+(totalMin%60)+" min";
}

function openEditor(){
  document.getElementById("editor").classList.add("open");
}

function closeEditor(){
  document.getElementById("editor").classList.remove("open");
}

function save(){
  data.push({
    date:document.getElementById("date").value,
    trip:document.getElementById("trip").value,
    duration:document.getElementById("duration").value,
    km:document.getElementById("km").value,
    car:document.getElementById("car").value,
    weather:document.getElementById("weather").value
  });
  closeEditor();
  render();
}

function resetData(){
  data=[];
  render();
}

render();
</script>

</body>
</html>
