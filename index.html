<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="apple-touch-icon" href="icon.png" />
<title>Conduite accompagnée</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f3f3f6;--text:#111;--muted:#8e8e93;--accent:#ff7a00;--line:#ececf1;--card:#fff}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:var(--bg);color:var(--text);padding:28px 18px 140px}
.app{max-width:760px;margin:0 auto}
h1{margin:0 0 10px;font-size:42px;font-weight:800;letter-spacing:-0.04em;color:var(--accent);line-height:1}
.subtitle{color:var(--muted);font-size:16px;margin-bottom:12px}
.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:var(--muted)}
.top-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.small-btn,.btn,.fab,.mini-btn{appearance:none;-webkit-appearance:none;border:none;cursor:pointer;pointer-events:auto}
.small-btn{background:#fff;color:var(--accent);border-radius:16px;padding:12px 14px;font-size:15px;font-weight:700;box-shadow:0 1px 0 rgba(0,0,0,.03)}
.list{display:flex;flex-direction:column}
.drive{display:grid;grid-template-columns:20px 1fr auto;gap:12px;padding:15px 0;border-bottom:1px solid var(--line);align-items:start}
.drive-bullet{width:20px;height:20px;border-radius:50%;border:1.5px solid #d1d1d6;margin-top:6px;background:#fff}
.drive-main{min-width:0}
.drive-title{font-size:18px;font-weight:600}
.drive-meta{margin-top:6px;font-size:14px;color:var(--accent);display:flex;gap:10px;flex-wrap:wrap}
.drive-note{margin-top:7px;font-size:14px;color:var(--muted);line-height:1.35}
.drive-actions{display:flex;gap:8px;align-self:center}
.mini-btn{background:#fff;border:1px solid var(--line);color:var(--accent);border-radius:14px;padding:10px 12px;font-size:14px;font-weight:700}
.empty{color:var(--muted);font-size:17px;display:none}
.totals{margin-top:22px;background:var(--card);border-radius:22px;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;box-shadow:0 1px 0 rgba(0,0,0,.03)}
.total-box{background:#fafafc;border:1px solid var(--line);border-radius:18px;padding:14px}
.total-label{font-size:13px;color:var(--muted);margin-bottom:6px}
.total-value{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
.editor-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.22);display:none;align-items:flex-end;padding:12px;z-index:9999}
.editor-backdrop.open{display:flex}
.editor-sheet{width:100%;background:#fff;border-radius:28px;padding:18px;max-height:92vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.18)}
.editor-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:12px}
.field{width:100%;padding:14px;border-radius:18px;border:1px solid #e7e7ec;margin-bottom:12px;font-size:17px;flex:1;min-width:0;background:#fff;color:#111}
.field:focus{border-color:var(--accent);outline:none}
.row{display:flex;gap:10px}
.actions{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:14px;border-radius:18px;font-weight:700;font-size:16px}
.btn-cancel{background:#f2f2f7;color:#111}
.btn-save{background:var(--accent);color:#fff}
.fab{position:fixed;right:22px;bottom:28px;width:76px;height:76px;border-radius:50%;background:var(--accent);color:#fff;font-size:42px;box-shadow:0 10px 24px rgba(255,122,0,.28);z-index:1000}
@media (max-width:560px){
  .drive{grid-template-columns:20px 1fr}
  .drive-actions{grid-column:2;justify-self:start;margin-top:10px}
  .totals{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <h1>Conduite accompagnée</h1>
  <div class="subtitle">Suivi des trajets de Quentin</div>
  <div class="notice" id="notice">Les trajets du fichier CSV sont déjà importés.</div>

  <div class="top-actions">
    <button id="importBtn" class="small-btn" type="button">Réimporter les données du CSV</button>
    <button id="resetBtn" class="small-btn" type="button">Réinitialiser l’application</button>
  </div>

  <div id="driveList" class="list"></div>
  <div id="emptyState" class="empty">Aucun trajet enregistré</div>

  <div class="totals">
    <div class="total-box">
      <div class="total-label">Kilomètres parcourus</div>
      <div class="total-value" id="totalKm">0 km</div>
    </div>
    <div class="total-box">
      <div class="total-label">Temps total</div>
      <div class="total-value" id="totalHours">0 h</div>
    </div>
  </div>
</div>

<button id="fab" class="fab" type="button">+</button>

<div id="editorBackdrop" class="editor-backdrop">
  <div class="editor-sheet">
    <div class="editor-title" id="editorTitle">Nouveau trajet</div>

    <input id="driveCar" class="field" placeholder="Voiture" />
    <input id="driveDate" type="date" class="field" />

    <div class="row">
      <input id="driveTrip" class="field" placeholder="Trajet" />
      <input id="driveWeather" class="field" placeholder="Météo" />
    </div>

    <div class="row">
      <input id="driveDuration" type="number" min="0" step="1" class="field" placeholder="Durée (min)" />
      <input id="driveKm" type="number" min="0" step="0.1" class="field" placeholder="Km" />
    </div>

    <input id="driveComment" class="field" placeholder="Commentaire" />

    <div class="actions">
      <button id="cancelBtn" class="btn btn-cancel" type="button">Annuler</button>
      <button id="saveBtn" class="btn btn-save" type="button">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const INITIAL_DRIVES = [
  {car:"Titine",date:"2025-12-19",trip:"Ville",duration:15,km:2.8,weather:"Nuit",comment:""},
  {car:"Titine",date:"2025-12-21",trip:"Agglomération",duration:18,km:7,weather:"Jour / Pluie",comment:""},
  {car:"Titine",date:"2025-12-22",trip:"Agglomération",duration:35,km:14.5,weather:"Jour / Nuit",comment:""},
  {car:"Félix",date:"2025-12-24",trip:"Ville",duration:30,km:12,weather:"Jour",comment:""},
  {car:"Félix",date:"2025-12-26",trip:"Ville",duration:30,km:20,weather:"Jour",comment:""},
  {car:"Félix",date:"2025-12-27",trip:"Ville",duration:25,km:16,weather:"Jour",comment:""},
  {car:"Félix",date:"2025-12-28",trip:"Agglomération",duration:28,km:16,weather:"Jour",comment:"Leroy Merlin"},
  {car:"Félix",date:"2026-01-15",trip:"Ville",duration:25,km:10,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-01-18",trip:"Ville",duration:10,km:2.4,weather:"Jour",comment:"Stade Guyancourt"},
  {car:"Félix",date:"2026-01-21",trip:"Ville",duration:10,km:2.4,weather:"Jour",comment:"Gare"},
  {car:"Félix",date:"",trip:"Ville",duration:15,km:4,weather:"Jour",comment:"Piscine et Nicolas About"},
  {car:"Félix",date:"2026-02-12",trip:"Ville",duration:45,km:22,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-01",trip:"Ville",duration:45,km:15,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-06",trip:"Ville",duration:45,km:19,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-07",trip:"Ville",duration:70,km:30,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-11",trip:"Ville",duration:10,km:3,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-14",trip:"Ville",duration:45,km:28,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-15",trip:"Ville",duration:20,km:10,weather:"Jour",comment:""},
  {car:"Félix",date:"2026-03-18",trip:"Ville",duration:15,km:4,weather:"Jour",comment:""}
];

const STORAGE_KEY = 'drives_conduite_quentin_v4';
let editingIndex = null;

function cloneInitial(){
  return INITIAL_DRIVES.map(item => ({...item}));
}

function storageAvailable(){
  try{
    const key='__test_storage__';
    localStorage.setItem(key,'1');
    localStorage.removeItem(key);
    return true;
  }catch(e){
    return false;
  }
}

const CAN_STORE = storageAvailable();

function getDrives(){
  if(!CAN_STORE) return cloneInitial();
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return cloneInitial();
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : cloneInitial();
  }catch(e){
    return cloneInitial();
  }
}

function saveDrives(drives){
  if(!CAN_STORE) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(drives));
}

function seedIfNeeded(){
  if(!CAN_STORE) return;
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    saveDrives(cloneInitial());
  }
}

function escapeHtml(str){
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function formatDateFr(date){
  if(!date) return 'Date non renseignée';
  const parts = date.split('-');
  if(parts.length !== 3) return date;
  const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});
}

function formatKm(value){
  return Number(value || 0).toLocaleString('fr-FR', {minimumFractionDigits:0, maximumFractionDigits:1}) + ' km';
}

function formatDuration(minutes){
  const total = Math.round(Number(minutes || 0));
  const h = Math.floor(total / 60);
  const m = total % 60;
  if(h && m) return h + ' h ' + m + ' min';
  if(h) return h + ' h';
  return m + ' min';
}

function setNotice(text){
  document.getElementById('notice').textContent = text;
}

function updateTotals(drives){
  const totalKm = drives.reduce((sum, item) => sum + (Number(item.km) || 0), 0);
  const totalMin = drives.reduce((sum, item) => sum + (Number(item.duration) || 0), 0);
  document.getElementById('totalKm').textContent = formatKm(totalKm);
  document.getElementById('totalHours').textContent = formatDuration(totalMin);
}

function buildDetail(drive){
  const parts = [];
  if(drive.car) parts.push('Voiture : ' + escapeHtml(drive.car));
  if(drive.weather) parts.push('Météo : ' + escapeHtml(drive.weather));
  if(drive.comment) parts.push('Note : ' + escapeHtml(drive.comment));
  return parts.join(' · ') || 'Aucun détail';
}

function render(){
  const drives = getDrives();
  const list = document.getElementById('driveList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';

  if(!drives.length){
    empty.style.display = 'block';
    updateTotals([]);
    return;
  }

  empty.style.display = 'none';

  drives.forEach((drive, index) => {
    const row = document.createElement('div');
    row.className = 'drive';
    row.innerHTML = `
      <div class="drive-bullet"></div>
      <div class="drive-main">
        <div class="drive-title">${escapeHtml(drive.trip || 'Trajet')}</div>
        <div class="drive-meta">
          <span>${formatDateFr(drive.date)}</span>
          <span>${formatDuration(drive.duration)}</span>
          <span>${formatKm(drive.km)}</span>
        </div>
        <div class="drive-note">${buildDetail(drive)}</div>
      </div>
      <div class="drive-actions">
        <button class="mini-btn" type="button" data-action="edit" data-index="${index}">Modifier</button>
        <button class="mini-btn" type="button" data-action="delete" data-index="${index}">Suppr.</button>
      </div>
    `;
    list.appendChild(row);
  });

  updateTotals(drives);
}

function openEditor(index){
  const drives = getDrives();
  const isNew = typeof index !== 'number';
  editingIndex = isNew ? null : index;
  const drive = isNew ? {car:'', date:'', trip:'', weather:'', duration:'', km:'', comment:''} : drives[index];

  document.getElementById('editorTitle').textContent = isNew ? 'Nouveau trajet' : 'Modifier le trajet';
  document.getElementById('driveCar').value = drive.car || '';
  document.getElementById('driveDate').value = drive.date || '';
  document.getElementById('driveTrip').value = drive.trip || '';
  document.getElementById('driveWeather').value = drive.weather || '';
  document.getElementById('driveDuration').value = drive.duration ?? '';
  document.getElementById('driveKm').value = drive.km ?? '';
  document.getElementById('driveComment').value = drive.comment || '';

  document.getElementById('editorBackdrop').classList.add('open');
}

function closeEditor(){
  document.getElementById('editorBackdrop').classList.remove('open');
  editingIndex = null;
}

function saveCurrentDrive(){
  const trip = document.getElementById('driveTrip').value.trim();
  if(!trip){
    setNotice('Le champ trajet est obligatoire.');
    return;
  }

  const entry = {
    car: document.getElementById('driveCar').value.trim(),
    date: document.getElementById('driveDate').value,
    trip: trip,
    weather: document.getElementById('driveWeather').value.trim(),
    duration: Number(document.getElementById('driveDuration').value || 0),
    km: Number(document.getElementById('driveKm').value || 0),
    comment: document.getElementById('driveComment').value.trim()
  };

  const drives = getDrives();
  if(editingIndex === null){
    drives.push(entry);
    setNotice('Nouveau trajet ajouté.');
  }else{
    drives[editingIndex] = entry;
    setNotice('Trajet modifié.');
  }

  saveDrives(drives);
  closeEditor();
  render();
}

function deleteDrive(index){
  const drives = getDrives();
  drives.splice(index, 1);
  saveDrives(drives);
  setNotice('Trajet supprimé.');
  render();
}

function reimportData(){
  saveDrives(cloneInitial());
  setNotice('Les données du CSV ont été réimportées.');
  render();
}

function resetApp(){
  if(CAN_STORE){
    localStorage.removeItem(STORAGE_KEY);
    seedIfNeeded();
  }
  setNotice('Application réinitialisée avec les données du CSV.');
  render();
}

function handleListClick(event){
  const button = event.target.closest('button[data-action]');
  if(!button) return;
  const index = Number(button.dataset.index);
  if(button.dataset.action === 'edit') openEditor(index);
  if(button.dataset.action === 'delete') deleteDrive(index);
}

function init(){
  seedIfNeeded();
  render();

  document.getElementById('fab').addEventListener('click', () => openEditor());
  document.getElementById('importBtn').addEventListener('click', reimportData);
  document.getElementById('resetBtn').addEventListener('click', resetApp);
  document.getElementById('cancelBtn').addEventListener('click', closeEditor);
  document.getElementById('saveBtn').addEventListener('click', saveCurrentDrive);
  document.getElementById('driveList').addEventListener('click', handleListClick);
  document.getElementById('editorBackdrop').addEventListener('click', (event) => {
    if(event.target.id === 'editorBackdrop') closeEditor();
  });
}

init();
</script>
</body>
</html>
