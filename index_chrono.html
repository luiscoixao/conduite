<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Drive Chrono</title>

<meta name="theme-color" content="#ff3cac">
<link rel="apple-touch-icon" href="icon.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:linear-gradient(135deg,#ff3cac,#784ba0,#2b86c5);
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:100%;
  max-width:520px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.block{
  border-radius:30px;
  padding:28px;
  text-align:center;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.15);
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.top{background:rgba(255,255,255,0.2);}
.middle{background:rgba(255,255,255,0.18);}
.bottom{background:rgba(255,255,255,0.22);}

label{
  display:block;
  font-size:14px;
  margin-bottom:10px;
  opacity:.9;
}

input{
  width:100%;
  border:none;
  background:rgba(255,255,255,0.25);
  border-radius:18px;
  padding:18px;
  font-size:32px;
  text-align:center;
  color:#fff;
  outline:none;
}

.result{
  font-size:34px;
  font-weight:900;
  line-height:1.3;
}

button{
  margin-top:14px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:900;
  background:linear-gradient(135deg,#00f2fe,#4facfe);
  color:#000;
}
</style>
</head>

<body>

<div class="container">

  <div class="block top">
    <label>Kilomètres départ</label>
    <input id="startKm" type="number" placeholder="0">
    <button onclick="start()">Démarrer</button>
  </div>

  <div class="block middle">
    <label>Kilomètres arrivée</label>
    <input id="endKm" type="number" placeholder="0">
    <button onclick="stop()">Stop</button>
  </div>

  <div class="block bottom">
    <div class="result" id="result">
      0 km<br>0 min
    </div>
  </div>

</div>

<script>
let startTime=null;
let startKm=null;

function start(){
  startKm=parseFloat(document.getElementById("startKm").value);
  if(isNaN(startKm)) return alert("Entrer km départ");
  startTime=Date.now();
}

function stop(){
  const endKm=parseFloat(document.getElementById("endKm").value);
  if(isNaN(endKm)) return alert("Entrer km arrivée");
  if(startTime===null) return alert("Démarrer d'abord");

  const distance=(endKm-startKm).toFixed(1);
  const minutes=Math.round((Date.now()-startTime)/60000);

  document.getElementById("result").innerHTML=
    distance+" km<br>"+minutes+" min";

  localStorage.setItem("lastTrip",JSON.stringify({distance,minutes}));
}

window.onload=()=>{
  const last=JSON.parse(localStorage.getItem("lastTrip")||"null");
  if(last){
    document.getElementById("result").innerHTML=
      last.distance+" km<br>"+last.minutes+" min";
  }
}
</script>

</body>
</html>
